version: "3.9"
services:
  mongo:
    image: mongo:6.0
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password

  backend:
    image: shailendrajr/backend
    container_name: backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      MONGO_URI: mongodb://root:password@mongo:27017/mydb?authSource=admin

  frontend:
    image: shailendrajr/frontend
    container_name: frontend
    restart: always
    ports:
      - "80:80" # Nginx serves on port 80
    depends_on:
      - backend

volumes:
  mongo-data: